name: Debug Agent

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    outputs:
      failed: ${{ steps.result.outputs.failed }}
      build_outcome: ${{ steps.build.outcome }}
      test_outcome: ${{ steps.test.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        id: install
        run: |
          if [ -f package-lock.json ]; then
            npm ci 2>&1 | tee install.log
          elif [ -f package.json ]; then
            npm install 2>&1 | tee install.log
          else
            echo "No package.json found — skipping install" | tee install.log
          fi
        continue-on-error: true

      - name: Build
        id: build
        run: |
          if [ -f package.json ] && npm run | grep -q "^  build$"; then
            npm run build 2>&1 | tee build.log
          else
            echo "No build script — skipping" | tee build.log
          fi
        continue-on-error: true

      - name: Test
        id: test
        run: |
          if [ -f package.json ] && npm run | grep -q "^  test$"; then
            npm test 2>&1 | tee test.log
          else
            echo "No test script — skipping" | tee test.log
          fi
        continue-on-error: true

      - name: Determine failure
        id: result
        run: |
          if [ "${{ steps.install.outcome }}" = "failure" ] \
            || [ "${{ steps.build.outcome }}" = "failure" ] \
            || [ "${{ steps.test.outcome }}" = "failure" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload logs
        if: steps.result.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            install.log
            build.log
            test.log
          if-no-files-found: ignore

  debug:
    needs: build-and-test
    if: |
      needs.build-and-test.outputs.failed == 'true'
      && (github.event_name != 'pull_request'
          || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: debug-logs
          path: ./_debug

      - name: Collect diff and changed files
        run: |
          mkdir -p ./_debug
          git diff HEAD~1 HEAD > ./_debug/commit.diff 2>/dev/null || echo "No prior commit" > ./_debug/commit.diff
          git diff --name-only HEAD~1 HEAD > ./_debug/changed_files.txt 2>/dev/null || true

      - name: Run debug agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-sonnet-4-5 --max-turns 40'
          branch_prefix: 'fix/debug-'
          base_branch: ${{ github.head_ref || github.ref_name }}
          prompt: |
            You are the Debug Agent. Follow the methodology in debug-agent-instructions.md strictly.

            Context for this run:
            - Commit SHA: ${{ github.sha }}
            - Run ID: ${{ github.run_id }}
            - Build outcome: ${{ needs.build-and-test.outputs.build_outcome }}
            - Test outcome: ${{ needs.build-and-test.outputs.test_outcome }}

            Inputs available on disk (read these first, do not explore the wider repo):
            - ./_debug/install.log
            - ./_debug/build.log
            - ./_debug/test.log
            - ./_debug/commit.diff
            - ./_debug/changed_files.txt

            Your job:
            1. Diagnose the failure per debug-agent-instructions.md.
            2. Edit the source file(s) to apply the minimal fix. Do not touch test files, do not add //@ts-ignore or eslint-disable.
            3. Output a final message that IS the Debug Agent Report block defined in debug-agent-instructions.md. The action will use it as the PR body, so format it exactly as the spec says.
            4. If confidence is Low, state so in the report and include the phrase "needs-human-review" on its own line at the end.

            Do not run git commands yourself — the action handles branching, committing, pushing, and opening the PR.
